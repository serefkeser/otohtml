<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otonom H1.136 — AI Video Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; margin:0; background:#0B0F19; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
  // Import map for bare specifiers
  (async () => {
    const map = document.createElement('script');
    map.type = 'importmap';
    map.textContent = JSON.stringify({
      imports: {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0",
        "firebase/app": "https://esm.sh/firebase@10.12.2/app",
        "firebase/auth": "https://esm.sh/firebase@10.12.2/auth",
        "firebase/firestore": "https://esm.sh/firebase@10.12.2/firestore"
      }
    });
    document.head.appendChild(map);

    // Fetch source from GitHub
    const resp = await fetch('https://raw.githubusercontent.com/serefkeser/otohtml/main/oto_hermes_H1.136.jsx');
    if (!resp.ok) throw new Error('Failed to fetch source: ' + resp.status);
    let source = await resp.text();

    // Transform JSX to JS using Babel
    const { code } = Babel.transform(source, {
      presets: ['react'],
      sourceType: 'module',
    });

    // Append render call
    const finalCode = `
import { createRoot } from 'react-dom/client';
${code}
createRoot(document.getElementById('root')).render(<App />);
`;

    // Create blob URL and inject as module script
    const blob = new Blob([finalCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    const script = document.createElement('script');
    script.type = 'module';
    script.src = url;
    document.body.appendChild(script);
  })();
</script>
</body>
</html>
